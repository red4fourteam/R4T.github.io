<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>R4T | ASSETS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="nav-container">
        <div class="nav-title">R4T ASSETS</div>
        <a href="index.html" class="btn-r4t">НА ГЛАВНУЮ</a>
        <a href="login.html" class="btn-r4t">ЛИЧНЫЙ КАБИНЕТ</a>
    </header>

    <div class="content">
        <h1 class="main-title">БИБЛИОТЕКА ПРОДУКТОВ</h1>
        
        <div class="product-grid">
            <!-- Карточка 1 -->
            <div class="product-box">
                <h2 style="color: #ff0000; margin: 0;">R4T INSTALLER</h2>
                <p style="font-size: 0.9rem; color: #aaa; margin: 20px 0;">
                    Единая точка входа. Скачайте инсталлер, чтобы получить доступ ко всей библиотеке софта R4T.
                </p>
                <a href="#" class="btn-r4t" style="width: 80%; padding: 10px;">СКАЧАТЬ .EXE</a>
            </div>

            <!-- Карточка 2 -->
            <div class="product-box" style="opacity: 0.5;">
                <h2 style="color: #555; margin: 0;">CORE BUILDER</h2>
                <p style="font-size: 0.9rem; color: #555; margin: 20px 0;">
                    Инструмент находится на стадии закрытого тестирования.
                </p>
                <span class="btn-r4t" style="width: 80%; padding: 10px; border-color: #333;">LOCKED</span>
            </div>
        </div>
    </div>

    <button class="xp-toggle" onclick="toggleXP()">РЕЖИМ WIN.XP</button>

    <script>
        function toggleXP() {
            document.body.classList.toggle('xp-mode');
            localStorage.setItem('xpMode', document.body.classList.contains('xp-mode'));
        }
        if (localStorage.getItem('xpMode') === 'true') { document.body.classList.add('xp-mode'); }
    </script>
</body>
</html>
